# Example config generated for Phase 16. Copy to active yaml and adjust redis.host / paths if needed.
server:
  host: "0.0.0.0"
  port: 8083
  threads: 1
  enable_sync_detect: false
  max_body_size_mb: 2

model:
  type: "detect"
  engine_path: "./engines/yolo11n.engine"
  labels_path: "./labels/coco.txt"
  gpu_id: 0
  use_gpu_postprocess: false

output:
  save_result_image: true
  input_dir: "./runtime/input/images/stream"
  output_dir: "./runtime/output/images/stream"
  jpeg_quality: 90

stream:
  enabled: true
  default_source_type: "camera"
  default_camera_id: 0
  default_rtsp_url: ""
  default_file_path: ""
  snapshot_dir: "./runtime/output/streams"
  snapshot_interval_frames: 5
  target_fps: 10
  max_no_frame_count: 30
  enable_reconnect: true
  reconnect_max_attempts: 3
  reconnect_delay_ms: 1000
  max_runtime_seconds: 0
  # Worker crash/stale stream cleanup threshold.
  stale_timeout_ms: 30000
  jpeg_quality: 90

redis:
  enabled: true
  host: "127.0.0.1"
  port: 6379
  password: ""
  db: 0
  stream_key: "yolo:stream:live:detect"
  consumer_group: "yolo11_stream_detect_group"
  consumer_name: "stream_worker_1"
  block_ms: 500
  ttl_seconds: 1800
  task_ttl_seconds: 1800
  stream_max_len: 10000
  enable_pending_reclaim: true
  pending_min_idle_ms: 60000
  max_redis_used_memory_mb: 2048

worker:
  enabled: true
  worker_num: 1
  min_alive_workers: 1
  consumer_name_prefix: "stream_worker_"
  log_task_done: true
  # Phase 15: descriptive capability/resource declaration.
  worker_group: "stream_detect_gpu0"
  worker_kind: "stream"
  task_kind: "live_stream"
  stream_type: "long_running_stream"
  max_concurrency: 1
  heartbeat_enabled: true
  heartbeat_interval_ms: 3000
  heartbeat_ttl_seconds: 15

logging:
  enabled: true
  log_dir: "./runtime/logs/stream/worker"
  level: "info"
  console: true
  file: true
  flush_interval_sec: 3
  max_file_size_mb: 50
  max_files: 5

metrics:
  enabled: true
  recent_window_seconds: 60
  ttl_seconds: 3600
