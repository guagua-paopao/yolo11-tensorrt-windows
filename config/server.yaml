server:
  host: "0.0.0.0"
  port: 8080
  threads: 4

model:
  type: "detect"
  engine_path: "D:/tensorrtx/yolo11/engines/yolo11n.engine"
  gpu_id: 0
  use_gpu_postprocess: false

output:
  save_result_image: true
  input_dir: "./temp/input"
  output_dir: "./output"
  jpeg_quality: 90

redis:
  enabled: true
  host: "172.19.196.109"
  port: 6379
  password: ""
  db: 0
  stream_key: "yolo:stream:detect"
  consumer_group: "yolo11_group"
  # Phase 4 后异步 Worker 会由 worker.consumer_name_prefix 自动生成 consumer 名称。
  # 这里保留 consumer_name 是为了兼容旧配置和单 Worker 调试。
  consumer_name: "worker_1"
  block_ms: 500
  ttl_seconds: 1800

worker:
  # 建议先填 1，确认稳定后再改 2。
  # 每个 worker 都会独立加载一个 TensorRT engine/context/CUDA stream/buffer，占用额外显存。
  enabled: true
  worker_num: 3
  consumer_name_prefix: "worker_"
  log_task_done: false
