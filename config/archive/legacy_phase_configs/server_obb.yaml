server:
  host: "0.0.0.0"
  port: 8080
  threads: 4
  # OBB Phase 10.0: HTTP server only submits/query tasks. Sync OBB HTTP is not enabled.
  enable_sync_detect: false
  max_body_size_mb: 16

model:
  type: "obb"
  engine_path: "D:/tensorrtx/yolo11/engines/yolo11n-obb.engine"
  labels_path: "D:/tensorrtx/yolo11/labels/dota.txt"
  gpu_id: 0
  # Phase 10.0 recommends CPU OBB postprocess first for correctness.
  use_gpu_postprocess: false

output:
  save_result_image: true
  input_dir: "./temp/input"
  output_dir: "./output"
  jpeg_quality: 90

logging:
  enabled: true
  log_dir: "./logs"
  level: "info"
  console: true
  file: true
  flush_interval_sec: 3
  max_file_size_mb: 50
  max_files: 5

redis:
  enabled: true
  host: "172.19.196.109"
  port: 6379
  password: ""
  db: 0
  stream_key: "yolo:stream:obb"
  consumer_group: "yolo11_obb_group"
  consumer_name: "obb_worker_1"
  block_ms: 500

  ttl_seconds: 1800
  task_ttl_seconds: 1800
  input_image_ttl_seconds: 600
  result_image_ttl_seconds: 1800
  max_image_bytes: 5242880
  max_result_image_bytes: 5242880
  delete_input_after_done: true
  max_redis_used_memory_mb: 2048

  stream_max_len: 10000
  enable_pending_reclaim: true
  pending_min_idle_ms: 10000

metrics:
  enabled: true
  recent_window_seconds: 60
  ttl_seconds: 3600

worker:
  enabled: false
  worker_num: 1
  min_alive_workers: 1
  consumer_name_prefix: "obb_worker_"
  log_task_done: true
  heartbeat_enabled: true
  heartbeat_interval_ms: 3000
  heartbeat_ttl_seconds: 15
